<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/chet.css">
    <title>Chet</title>
</head>
<body>
    <div class="nav">
        <div class="options">
            <a class="nav-opt opt-selected" href="">Mensagens</a>
            <a class="nav-opt" href="">Configurações</a>
            <a class="nav-opt" href="">Suporte</a>
        </div>
        <div class="options">
            <a class="nav-account" href="">@username</a>
        </div>
    </div>
    <div class="main">
        <div class="contats" id="contats">
            <div class="contats-opt">

            </div>
        </div>

        <div class="divider" id="divider">
            <div class="divider-handle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="chat" id="chat">
            <!-- chat aqui -->
        </div>
    </div>

    <!-- overlay evita que o mouse "escape" durante o arraste -->
    <div id="drag-overlay"></div>

    <script>
        const contats  = document.getElementById('contats');
        const chat     = document.getElementById('chat');
        const divider  = document.getElementById('divider');
        const overlay  = document.getElementById('drag-overlay');
        const main     = document.querySelector('.main');

        // largura mínima em px de cada painel
        const MIN_PX = 300;
        const MIN_CHAT_PX = 1000;

        let dragging  = false;
        let startX    = 0;
        let startW    = 0;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function applyWidth(px) {
            const maxW = main.clientWidth - divider.offsetWidth - MIN_CHAT_PX;
            const w    = clamp(px, MIN_PX, maxW);
            contats.style.width     = w + 'px';
            contats.style.flexShrink = '0';
        }

        /* ── Mouse ── */
        divider.addEventListener('mousedown', e => {
            dragging = true;
            startX   = e.clientX;
            startW   = contats.getBoundingClientRect().width;
            divider.classList.add('dragging');
            overlay.classList.add('active');
            e.preventDefault();
        });

        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            applyWidth(startW + (e.clientX - startX));
        });

        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            divider.classList.remove('dragging');
            overlay.classList.remove('active');
        });

        /* ── Touch ── */
        divider.addEventListener('touchstart', e => {
            dragging = true;
            startX   = e.touches[0].clientX;
            startW   = contats.getBoundingClientRect().width;
            divider.classList.add('dragging');
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', e => {
            if (!dragging) return;
            applyWidth(startW + (e.touches[0].clientX - startX));
        }, { passive: false });

        document.addEventListener('touchend', () => {
            dragging = false;
            divider.classList.remove('dragging');
        });
    </script>
</body>
</html>
