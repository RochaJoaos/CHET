<!DOCTYPE html>

<body>
    <section>
        <h1>Criar uma conta</h1>
        <div class="inpbox">
            <label for="name">Email</label>
            <input class="input" type="email" name="email" id="input-email">
        </div>
        <div class="inpbox">
            <label for="name">Nome Exibido</label>
            <input class="input" type="text" name="name" id="input-name">
        </div>
        <div class="inpbox">
            <label for="name">Senha</label>
            <input class="input" type="password" name="password" id="input-password">
        </div>
        <div class="inpbox">
            <label for="name">Confirmar Senha</label>
            <input class="input" type="password" name="password" id="input-password">
        </div>
        <div class="inpbox">
            <label for="name">Data de nascimento</label>
            <div class="date">
                <input class="input-date" placeholder="Mês" type="date" name="mounth" id="input-bithday">
            </div>
        </div>
        <div class="ipnbox">
            <p class="terms">Ao cadastrar-se você concorda com os<a href="">Termos de serviço</a> e estará ciente do <a href="">Aviso de privacidade</a> da comunidade.</p>
        </div>
        <input type="button" value="Cadastrar" class="btn">
        <a href="log.html" target="_self" rel="noopener noreferrer">Já tenho conta</a>
    </section>
